name: Publish

# Publishes the gem to RubyGems via Trusted Publishing (OIDC) - no API key, no OTP,
# so multi-factor auth on the account does not block CI.
#
# One-time setup on rubygems.org (Profile -> Trusted Publishers -> add / "pending"):
#   Repository owner: ai2web-foundation
#   Repository name:  ai2web-ruby
#   Workflow filename: publish.yml
#
# Then release by pushing a version tag (e.g. v0.1.0) or running this workflow manually.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Test before publish
        run: ruby test/run.rb
      - name: Configure RubyGems credentials (OIDC trusted publishing)
        uses: rubygems/configure-rubygems-credentials@v2.1.0
      - name: Build gem
        run: gem build ai2web.gemspec
      - name: Push gem
        run: gem push ai2web-*.gem
